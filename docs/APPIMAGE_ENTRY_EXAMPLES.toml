# AppImage Catalog Entry Examples
# This file shows real examples of how to add AppImage support to the Linite software catalog
# These are reference examples you can copy/paste into data/catalog/*.toml files

# ============================================================================
# EXAMPLE 1: Basic AppImage-Only App (Obsidian)
# ============================================================================
# Obsidian is a note-taking app available as AppImage on Linux
# It prefers Flatpak but can fall back to AppImage if Flatpak not available

[[apps]]
id          = "obsidian"
name        = "Obsidian"
description = "Powerful knowledge base that works on top of a local folder of plain-text Markdown files"
category    = "note_taking"
icon        = "🔮"
website     = "https://obsidian.md"
preferred_pm = "flatpak"

[apps.install_specs.flatpak]
# Flatpak is the preferred installation method
flatpak_id = "md.obsidian.Obsidian"
packages   = []

[apps.install_specs.appimage]
# AppImage as fallback if Flatpak is unavailable
packages   = ["Obsidian"]
script_url = "https://github.com/obsidianmd/obsidian-releases/releases/download/latest/Obsidian-latest-x64.AppImage"
sha256     = "abc123def456789..."  # Use: python utils/appimage_helper.py generate ... to fill this


# ============================================================================
# EXAMPLE 2: Development Tool (JetBrains Toolbox) - AppImage Only
# ============================================================================
# JetBrains Toolbox is primarily distributed as AppImage on Linux
# No native PM or Flatpak available, so AppImage is the primary/only option

[[apps]]
id          = "jetbrains-toolbox"
name        = "JetBrains Toolbox"
description = "JetBrains Toolbox App helps manage all your JetBrains tools, projects, and licenses"
category    = "development"
icon        = "🚀"
website     = "https://www.jetbrains.com/toolbox-app/"
preferred_pm = "appimage"  # Primary installation method

[apps.install_specs.appimage]
packages   = ["jetbrains-toolbox"]
script_url = "https://download.jetbrains.com/toolbox/jetbrains-toolbox-latest.tar.gz"
# Note: Some apps distribute as .tar.gz, extract the .AppImage from within
sha256     = "def456789abc123..."


# ============================================================================
# EXAMPLE 3: Kubernetes Tool (Headlamp) - AppImage with Snap alternative
# ============================================================================
# Headlamp is a Kubernetes dashboard available as AppImage
# Can also use Snap if AppImage causes compatibility issues

[[apps]]
id          = "headlamp"
name        = "Headlamp"
description = "An easy-to-use and extensible web-based Kubernetes UI"
category    = "development"
icon        = "⚙️"
website     = "https://headlamp.dev/"
preferred_pm = "appimage"

[apps.install_specs.snap]
# Snap available as alternative
packages = ["headlamp"]

[apps.install_specs.appimage]
# AppImage as primary recommendation
packages   = ["Headlamp"]
script_url = "https://github.com/kinvolk/headlamp/releases/download/latest/Headlamp-latest-x64.AppImage"
sha256     = "xyz789abc456..."


# ============================================================================
# EXAMPLE 4: CLI Tool (Insync) - AppImage as Fallback
# ============================================================================
# Insync is a cloud sync client with multiple installation options
# Can use native PM (if available for distro) or AppImage as fallback

[[apps]]
id          = "insync"
name        = "Insync"
description = "Client sync app for Google Drive, Dropbox, OneDrive and SharePoint"
category    = "utilities"
icon        = "☁️"
website     = "https://www.insynchq.com/"
preferred_pm = "native"  # Some distros have native RPM/DEB packages

[apps.install_specs.native]
# Ubuntu/Debian as example
packages = ["insync"]
repos = [
  "deb https://d2t3ff60b2234bef8087f4b6b52d34d68d12011a.ddns.net/deb focal non-free"
]

[apps.install_specs.appimage]
# AppImage as fallback if native package unavailable
packages   = ["insync"]
script_url = "https://www.insynchq.com/downloads/insync-latest-x86_64.AppImage"
sha256     = "789abc456def123..."


# ============================================================================
# EXAMPLE 5: Graphics Tool (draw.io) - Multiple Install Options
# ============================================================================
# draw.io offers web, AppImage, Flatpak, and native package options
# Shows a comprehensive example with multiple PM support

[[apps]]
id          = "drawio"
name        = "draw.io"
description = "Integrates with Atlassian, Microsoft, Google Cloud, or uses the web, desktop or command-line apps"
category    = "graphics"
icon        = "📊"
website     = "https://www.diagrams.net/"
preferred_pm = "flatpak"

[apps.install_specs.flatpak]
flatpak_id = "com.github.jgraph.drawio"
packages   = []

[apps.install_specs.snap]
packages = ["draw.io"]

[apps.install_specs.appimage]
packages   = ["draw.io"]
script_url = "https://github.com/jgraph/drawio-desktop/releases/download/latest/drawio-latest-x64.AppImage"
sha256     = "456def789abc123..."


