# ============================================================================
# KEY PATTERNS AND NOTES
# ============================================================================

# Pattern 1: Finding AppImage Download URLs
# Most repos follow similar patterns:
# - GitHub: https://github.com/{user}/{repo}/releases/download/{tag}/{filename}.AppImage
# - Official sites: https://example.com/download/example-latest-x64.AppImage
# - Use GitHub API: https://api.github.com/repos/{user}/{repo}/releases/latest

# Pattern 2: Binary Name Convention
# - Extract from packages[0] field (remove spaces, lowercase)
# - "Obsidian" → ~/.local/bin/Obsidian (exact case from packages[0])
# - "JetBrains Toolbox" → ~/.local/bin/JetBrainToolbox

# Pattern 3: SHA-256 Calculation
# Run: python utils/appimage_helper.py generate <id> <name> <url> <download_url>
# This automatically calculates the SHA-256 from the actual release file

# Pattern 4: Icon Emojis
# ✨ Utilities/Tools
# 🔮 Note-taking/Wikis
# 🚀 Development tools
# 📊 Graphics/Diagramming
# ☁️ Cloud utilities
# 🎮 Games
# 📺 Media players
# 🔐 Security tools

# Pattern 5: Categories
# Valid categories (from data/catalog/): 
# communication, development, gaming, graphics, java, media, 
# note_taking, office, password_managers, security, 
# terminal_emulators, torrents, utilities, video_editors, 
# virtualization, vpn, web_browsers

# Pattern 6: Multiple PM Fallback
# Recommended order (what Linite uses):
#   1. native (apt, dnf, pacman, zypper, yay)
#   2. flatpak
#   3. snap
#   4. appimage    ← Fallback before last resort (always available)
#   5. (future PMs)

# Pattern 7: Unstable URLs
# URLs with /latest/ or /releases/latest/ are convenient but can break
# Prefer specific version tags when stability is important:
# - Good:  https://github.com/.../releases/download/v1.0.5/app-v1.0.5-x64.AppImage
# - Risky: https://github.com/.../releases/download/latest/app-latest-x64.AppImage

# ============================================================================
# CONTRIBUTING GUIDELINES
# ============================================================================

# 1. Find an AppImage-distributed app (GitHub, official website, etc.)
# 2. Use appimage_helper.py to generate the entry with calculated SHA-256:
#    python utils/appimage_helper.py generate \
#      {app-id} "{App Name}" "{website}" "{download_url}" \
#      --icon "{emoji}"
# 3. Paste the generated TOML into the appropriate data/catalog/{category}.toml
# 4. Test the installation: linite --cli install {app-id}
# 5. Verify: {binary-name} --version
# 6. Submit PR with description of app and why it's useful

# For questions, see docs/APPIMAGE_SUPPORT.md
