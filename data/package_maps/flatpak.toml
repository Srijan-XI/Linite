# Linite Flatpak Package Map
# ---------------------------
# Maps catalog app IDs → Flatpak package specs.
# flatpak_remote is the remote to install from (almost always "flathub").
# All Flatpak App IDs are fully-qualified reverse-DNS identifiers.

# ── Web Browsers ──────────────────────────────────────────────────────────────

[firefox]
packages = ["org.mozilla.firefox"]
flatpak_remote = "flathub"

[chromium]
packages = ["org.chromium.Chromium"]
flatpak_remote = "flathub"

[brave]
packages = ["com.brave.Browser"]
flatpak_remote = "flathub"

