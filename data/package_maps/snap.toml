# Linite Snap Package Map
# ------------------------
# Maps catalog app IDs → Snap package specs.
# snap_classic = true  → installed with --classic flag.
# channel overrides the default "stable" if needed.

# ── Web Browsers ──────────────────────────────────────────────────────────────

[firefox]
packages = ["firefox"]

[chromium]
packages = ["chromium"]

[brave]
packages = ["brave"]

# ── Development ───────────────────────────────────────────────────────────────

[git]
packages = ["git-ubuntu"]
# Usually prefer distro package; snap listed as fallback

[vscode]
packages = ["code"]
snap_classic = true

[python3]
packages = ["python312"]
snap_classic = true

[nodejs]
packages = ["node"]
snap_classic = true

[gh]
packages = ["gh"]
snap_classic = true

[curl]
# Prefer system package; snap not recommended for curl
packages = []

[wget]
# Prefer system package
packages = []

[htop]
packages = ["htop"]

# ── Media ─────────────────────────────────────────────────────────────────────

[vlc]
packages = ["vlc"]

[obs]
packages = ["obs-studio"]
snap_classic = true

[audacity]
packages = ["audacity"]

# ── Communication ─────────────────────────────────────────────────────────────

[thunderbird]
packages = ["thunderbird"]

[discord]
packages = ["discord"]

[slack]
packages = ["slack"]
snap_classic = true

[zoom]
packages = ["zoom-client"]

[telegram]
packages = ["telegram-desktop"]

# ── Utilities ─────────────────────────────────────────────────────────────────

[flameshot]
