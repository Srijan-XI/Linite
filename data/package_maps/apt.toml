  "echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] https://download.virtualbox.org/virtualbox/debian $(. /etc/os-release && echo $VERSION_CODENAME) contrib\" | tee /etc/apt/sources.list.d/virtualbox.list",
