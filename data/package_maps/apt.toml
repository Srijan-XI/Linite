# Linite APT Package Map
# -----------------------
# Maps catalog app IDs → APT package specs.
# Empty entries are omitted (app will fall back to flatpak/snap or fail gracefully).
# pre_commands run before apt-get install; post_commands run after.

# ── Web Browsers ──────────────────────────────────────────────────────────────

[firefox]
packages = ["firefox"]

[chromium]
packages = ["chromium-browser"]

[brave]
packages = ["brave-browser"]
pre_commands = [
  "curl -fsSL https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg | gpg --dearmor | tee /usr/share/keyrings/brave-browser-archive-keyring.gpg > /dev/null",
  "echo \"deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] https://brave-browser-apt-release.s3.brave.com/ stable main\" | tee /etc/apt/sources.list.d/brave-browser-release.list",
  "apt-get update",
]

# google-chrome: no native deb in canonical repos — use flatpak or script
# opera: best installed via flatpak or official deb from opera.com
# tor-browser: via flatpak or torbrowser-launcher
# vivaldi: via official vivaldi deb repo

# ── Development ───────────────────────────────────────────────────────────────

[git]
packages = ["git"]

[vscode]
packages = ["code"]
pre_commands = [
  "wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /etc/apt/trusted.gpg.d/packages.microsoft.gpg",
  "echo \"deb [arch=amd64,arm64,armhf signed-by=/etc/apt/trusted.gpg.d/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main\" | tee /etc/apt/sources.list.d/vscode.list",
  "apt-get update",
]

[python3]
packages = ["python3", "python3-pip", "python3-venv"]

[nodejs]
packages = ["nodejs", "npm"]
pre_commands = [
  "curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -",
]

[docker]
packages = ["docker-ce", "docker-ce-cli", "containerd.io", "docker-buildx-plugin", "docker-compose-plugin"]
pre_commands = [
  "apt-get install -y ca-certificates curl gnupg",
  "install -m 0755 -d /etc/apt/keyrings",
  "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg",
  "chmod a+r /etc/apt/keyrings/docker.gpg",
  "echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo \\\"$VERSION_CODENAME\\\") stable\" | tee /etc/apt/sources.list.d/docker.list",
  "apt-get update",
]
post_commands = [
  "systemctl enable --now docker",
  "usermod -aG docker $SUDO_USER",
]

[vim]
packages = ["vim"]

[neovim]
packages = ["neovim"]

[gh]
packages = ["gh"]
pre_commands = [
  "curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg",
  "echo \"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\" | tee /etc/apt/sources.list.d/github-cli.list",
  "apt-get update",
]

[curl]
packages = ["curl"]

[wget]
packages = ["wget"]

[htop]
packages = ["htop"]

# ── Media ─────────────────────────────────────────────────────────────────────

[vlc]
packages = ["vlc"]

[mpv]
