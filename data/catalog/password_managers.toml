[[apps]]
id          = "bitwarden"
name        = "Bitwarden"
description = "Open-source password manager — store, sync, and share sensitive data."
category    = "Password Managers"
icon        = "🔑"
website     = "https://bitwarden.com"
preferred_pm = "flatpak"

[apps.install_specs.flatpak]
packages = ["com.bitwarden.desktop"]

[apps.install_specs.snap]
packages = ["bitwarden"]

[[apps]]
id          = "keepassxc"
name        = "KeePassXC"
description = "Cross-platform community-driven port of KeePass password manager."
category    = "Password Managers"
icon        = "🗝️"
website     = "https://keepassxc.org"
preferred_pm = "flatpak"

[apps.install_specs.apt]
packages = ["keepassxc"]

[apps.install_specs.dnf]
packages = ["keepassxc"]

[apps.install_specs.pacman]
packages = ["keepassxc"]

[apps.install_specs.zypper]
packages = ["keepassxc"]

[apps.install_specs.flatpak]
packages = ["org.keepassxc.KeePassXC"]

[[apps]]
id          = "1password"
name        = "1Password"
description = "The world's most-loved password manager. Secure every sign-in."
category    = "Password Managers"
icon        = "🔐"
website     = "https://1password.com"
preferred_pm = "apt"

[apps.install_specs.apt]
packages = ["1password"]
pre_commands = [
  "curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor | tee /usr/share/keyrings/1password-archive-keyring.gpg > /dev/null",
  "echo \"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/$(dpkg --print-architecture) stable main\" | tee /etc/apt/sources.list.d/1password.list",
  "apt-get update",
]

