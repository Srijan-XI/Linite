[[apps]]
id          = "vscode"
name        = "Visual Studio Code"
description = "Lightweight but powerful source-code editor by Microsoft."
category    = "Development"
icon        = "💻"
website     = "https://code.visualstudio.com"
preferred_pm = "snap"

[apps.install_specs.snap]
packages = ["code"]
snap_classic = true

[apps.install_specs.flatpak]
packages = ["com.visualstudio.code"]

[apps.install_specs.apt]
packages = ["code"]
pre_commands = [
  "wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /tmp/packages.microsoft.gpg",
  "install -o root -g root -m 644 /tmp/packages.microsoft.gpg /etc/apt/trusted.gpg.d/",
  "echo \"deb [arch=amd64,arm64,armhf signed-by=/etc/apt/trusted.gpg.d/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main\" > /etc/apt/sources.list.d/vscode.list",
  "apt-get update",
]

